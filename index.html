<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Base64 Live Codec</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        font-family: system-ui, sans-serif;
      }

      body {
        display: flex;
        background: #f4f4f5;
      }

      .app {
        display: flex;
        flex-direction: column;
        width: 100svw;
        height: 100svh;
        gap: 8px;
        padding: 8px;

        @media (orientation: landscape) {
          flex-direction: row;
        }
      }

      .pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        background: #ffffff;
        border: 1px solid #d4d4d8;
        border-radius: 10px;
        overflow: hidden;
      }

      .pane-header {
        padding: 10px 12px;
        border-bottom: 1px solid #e4e4e7;
        font-size: 14px;
        font-weight: 600;
        color: #27272a;
        background: #fafafa;
      }

      textarea {
        flex: 1;
        width: 100%;
        min-height: 0;
        padding: 12px;
        resize: none;
        border: 0;
        outline: none;
        font:
          15px/1.5 ui-monospace,
          monospace;
        color: #18181b;
        background: #ffffff;
      }

      textarea[readonly] {
        background: #fbfbfb;
        color: #3f3f46;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="pane">
        <div class="pane-header">Input</div>
        <textarea
          id="input"
          autofocus
          spellcheck="false"
          placeholder="Enter Base64 or plain text"
        ></textarea>
      </section>

      <section class="pane">
        <div class="pane-header">Output</div>
        <textarea
          id="output"
          readonly
          spellcheck="false"
          placeholder="Result will appear here"
        ></textarea>
      </section>
    </main>

    <script>
      const input = document.getElementById("input");
      const output = document.getElementById("output");

      function encodeBase64(text) {
        const bytes = new TextEncoder().encode(text);
        return bytes.toBase64();
      }

      function decodeBase64(base64Text) {
        const bytes = Uint8Array.fromBase64(base64Text.trim());
        return new TextDecoder("utf-8", { fatal: true }).decode(bytes);
      }

      function updateOutput() {
        const text = input.value;

        try {
          output.value = decodeBase64(text);
        } catch {
          output.value = encodeBase64(text);
        }
      }

      input.addEventListener("input", updateOutput);
      updateOutput();
    </script>
  </body>
</html>
